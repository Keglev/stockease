name: Docs Coverage Deploy

on:
  workflow_run:
    workflows: ["Docs Pipeline"]
    types: [completed]

permissions:
  contents: write

jobs:
  coverage-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download docs-site artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          run-id: ${{ github.event.workflow_run.id }}  # artifact from the triggering run, not the latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect project root
        run: bash .github/scripts/shared/detect-maven-project.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests with JaCoCo
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn -B clean test

      - name: Generate coverage wrapper
        run: bash .github/scripts/docs/generate-coverage-wrapper.sh

      - name: Deploy coverage to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/docs/coverage
          destination_dir: coverage  # deploys into /coverage subfolder of gh-pages, not the root