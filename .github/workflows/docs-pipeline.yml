name: Docs Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pom.xml'
      - '.github/workflows/docs-pipeline.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history; shallow clone omits git metadata used by docs scripts

      - name: Detect project root
        run: bash .github/scripts/shared/detect-maven-project.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate API docs
        run: bash .github/scripts/docs/generate-api-docs.sh

      - name: Install Pandoc
        run: sudo apt-get update -q && sudo apt-get install -y -q pandoc

      - name: Generate architecture docs
        run: |
          bash .github/scripts/docs/generate-docs.sh \
            --source architecture \
            --output architecture \
            --toc-depth 3 \
            --lua-filter  # converts mermaid fences and .md links for mermaid.js

      - name: Generate additional docs
        run: |
          bash .github/scripts/docs/generate-docs.sh \
            --source . \
            --output generated \
            --exclude "*/architecture/*" \
            --exclude "*/templates/*"

      - name: Fix directory links
        run: bash .github/scripts/docs/fix-directory-links.sh

      - name: Copy documentation index
        run: cp "$PROJECT_DIR/.github/scripts/templates/index.html" "$PROJECT_DIR/target/docs/index.html"

      - name: Verify output
        run: |
          OUTPUT_DIR="$PROJECT_DIR/target/docs"
          echo "Files: $(find "$OUTPUT_DIR" -type f | wc -l)"
          du -sh "$OUTPUT_DIR"

      - name: Upload docs-site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: ${{ env.PROJECT_DIR }}/target/docs

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PROJECT_DIR }}/target/docs