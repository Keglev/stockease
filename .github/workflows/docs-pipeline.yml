name: Docs Pipeline

on:
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/scripts/docs/**'
      - '.github/workflows/docs-pipeline.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: docs-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    # workflow_run fires for every "Deploy Backend" run, including PR runs -
    # only successful non-PR runs may rebuild the published site.
    if: >
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event != 'pull_request')
      || github.event_name != 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Fresh coverage only exists when backend CI just ran; on docs-only
      # pushes the deploy workflow preserves the previously published report.
      - name: Download JaCoCo artifact
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: jacoco-html-${{ github.event.workflow_run.head_sha }}
          path: target/site/jacoco
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install ReDoc CLI
        run: npm install -g @redocly/cli

      - name: Install Pandoc
        run: sudo apt-get update -qq && sudo apt-get install -y pandoc

      - name: Build docs site
        run: bash .github/scripts/docs/build-docs.sh .

      - name: Upload docs-site artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: target/docs
