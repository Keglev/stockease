name: Deploy Backend

on:
  schedule:
    - cron: '0 6 1,15 * *'  # rebuild every two weeks to pick up patched base images
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '.github/workflows/docs-pipeline.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Set to 'false' for emergency hotfixes only
  RUN_TESTS: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project root
        run: bash .github/scripts/shared/detect-maven-project.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x "$PROJECT_DIR/mvnw"

      - name: Run tests
        if: env.RUN_TESTS == 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./mvnw -B -ntp test

      - name: Build and verify
        working-directory: ${{ env.PROJECT_DIR }}
        # -DskipTests: tests already ran in previous step
        # -Dspringdoc.skip=true: skips OpenAPI doc generation at build time
        run: ./mvnw -B -ntp -DskipTests -Dspringdoc.skip=true verify

  deploy:
    if: github.event_name != 'pull_request' # pull requests must not deploy
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project root
        run: bash .github/scripts/shared/detect-maven-project.sh

      - name: Validate Dockerfile
        run: bash .github/scripts/deploy/validate-dockerfile.sh

      - name: Trigger Koyeb redeploy
        env:
          KOYEB_API_KEY: ${{ secrets.KOYEB_API_KEY }}
          KOYEB_SERVICE_ID: ${{ secrets.KOYEB_SERVICE_ID }}
        run: bash .github/scripts/deploy/koyeb-redeploy.sh

      - name: Wait for service healthy
        env:
          KOYEB_API_KEY: ${{ secrets.KOYEB_API_KEY }}
          KOYEB_SERVICE_ID: ${{ secrets.KOYEB_SERVICE_ID }}
        run: bash .github/scripts/deploy/koyeb-wait-healthy.sh