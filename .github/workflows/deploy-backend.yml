name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '.github/workflows/docs-pipeline.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  RUN_TESTS: 'true'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project root
        run: bash .github/scripts/shared/detect-maven-project.sh

      - name: Validate Dockerfile
        run: bash .github/scripts/deploy/validate-dockerfile.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x "$PROJECT_DIR/mvnw"

      - name: Run tests
        if: env.RUN_TESTS == 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./mvnw -B -ntp test

      - name: Build and verify
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./mvnw -B -ntp -DskipTests -Dspringdoc.skip=true verify

      - name: Trigger Koyeb redeploy
        env:
          KOYEB_API_KEY: ${{ secrets.KOYEB_API_KEY }}
          KOYEB_SERVICE_ID: ${{ secrets.KOYEB_SERVICE_ID }}
        run: bash .github/scripts/deploy/koyeb-redeploy.sh

      - name: Wait for service healthy
        env:
          KOYEB_API_KEY: ${{ secrets.KOYEB_API_KEY }}
          KOYEB_SERVICE_ID: ${{ secrets.KOYEB_SERVICE_ID }}
        run: bash .github/scripts/deploy/koyeb-wait-healthy.sh