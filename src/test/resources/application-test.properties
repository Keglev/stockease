# Test environment configuration — overrides application.properties for tests.
# Datasource connection details come from the Testcontainers PostgreSQL
# container via @ServiceConnection in AbstractIntegrationTest; no jdbc URL here.

# Flyway owns the schema; Hibernate only checks entity mappings
# against it. create-drop silently rebuilt tables from annotations
# and discarded exact DDL (partial index, NUMERIC precision).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevents DB connection leaks in web layer during tests
spring.jpa.open-in-view=false

# HikariCP settings for test pool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
