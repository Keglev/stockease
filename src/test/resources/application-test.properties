# Test environment configuration — overrides application.properties with H2 in-memory database.
# Used by all tests annotated with @SpringBootTest or @DataJpaTest.

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect and schema management
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevents DB connection leaks in web layer during tests
spring.jpa.open-in-view=false

# HikariCP settings for test pool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
