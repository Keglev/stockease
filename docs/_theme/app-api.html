<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$en$endif$">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$title$ · StockEase · API</title>

  <!-- Set the theme before the stylesheet paints, otherwise the page flashes
       the default theme for one frame before the saved choice applies. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("stockease-theme") ||
          (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <link rel="stylesheet" href="/stockease/assets/docs.css" />
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar">
    <div class="topbar-inner">
      <button class="menu-btn" aria-label="Toggle navigation">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <a href="/stockease/" class="brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 7l9-4 9 4-9 4-9-4z" /><path d="M3 7v10l9 4 9-4V7" /><path d="M12 11v10" />
        </svg>
        StockEase Docs
      </a>
      <!-- Badge distinguishes API-reference pages from architecture pages. -->
      <span class="badge">API</span>

      <div class="topbar-tools">
        <a href="/stockease/" style="font:14px sans-serif;padding:6px 12px;background:#2563eb;color:#fff;text-decoration:none;border-radius:4px;">&larr; Back to docs</a>
        <!-- Client-side search input is added in the dedicated search pass. -->
        <span class="lang-switch">
          <a href="/stockease/" aria-current="true">EN</a>
          <a href="/stockease/index-de.html">DE</a>
        </span>
        <button class="theme-toggle" aria-label="Toggle light or dark theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="9" /><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    $nav-frontend()$

    <main class="content" id="main">
      <article class="doc-body">
        $body$
      </article>
    </main>

    $if(toc)$
    <nav class="toc" aria-label="On this page">
      <p class="toc-title">On this page</p>
      $toc$
    </nav>
    $endif$
  </div>

  <footer class="footer">
    StockEase · API Reference · Generated by Docs Pipeline
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="/stockease/assets/docs.js"></script>
</body>
</html>
