get:
  summary: Retrieve all products
  description: |
    Loads entire inventory without pagination. Returns all products sorted by ID.
    Use /api/products/paged for large datasets to prevent memory issues.
  operationId: getAllProducts
  tags:
    - Products
  security:
    - BearerAuth: []
  responses:
    '200':
      description: Successfully retrieved all products
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductList'
          example:
            - id: 1
              name: Laptop
              quantity: 50
              purchasePrice: 999.99
              sku: SKU-A1B2C3D4
              totalValue: 49999.50
            - id: 2
              name: Mouse
              quantity: 200
              purchasePrice: 25.99
              sku: SKU-B2C3D4E5
              totalValue: 5198.00
    '401':
      description: Unauthorized - missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecurityErrorResponse'
          example:
            error: Invalid username or password

post:
  summary: Create a new product (ADMIN only)
  description: |
    Creates a new product with provided name, quantity, and purchasePrice.
    Validates all required fields and business rules:
    - Name must be non-empty
    - Quantity cannot be negative
    - purchasePrice must be positive (> 0)
    Automatically calculates totalValue = quantity * purchasePrice.
    A sku is generated automatically if not supplied.
  operationId: createProduct
  tags:
    - Products
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - quantity
            - purchasePrice
          properties:
            name:
              type: string
              example: New Laptop
            quantity:
              type: integer
              minimum: 0
              example: 25
            purchasePrice:
              type: number
              format: double
              minimum: 0.01
              example: 1299.99
  responses:
    '200':
      description: Product created successfully - returns the persisted Product entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Product'
          example:
            id: 3
            name: New Laptop
            quantity: 25
            purchasePrice: 1299.99
            sku: SKU-C3D4E5F6
            totalValue: 32499.75
    '400':
      description: Validation error - missing or invalid fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          example:
            success: false
            message: "Validation failed for request parameters."
            data:
              name: must not be blank
              quantity: must be greater than or equal to 0
    '401':
      description: Unauthorized - missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    '403':
      description: Forbidden - insufficient permissions (requires ADMIN role)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
