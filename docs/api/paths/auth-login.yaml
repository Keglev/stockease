post:
  summary: Authenticate user and generate JWT token
  description: |
    Validates user credentials against stored user records via Spring Security.
    Upon successful authentication, issues a signed JWT token with embedded user role.
    Token can be used for subsequent API requests requiring USER or ADMIN role authorization.
  operationId: login
  tags:
    - Authentication
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/LoginRequest'
        example:
          username: admin
          password: password123
  responses:
    '200':
      description: Authentication successful - JWT token returned
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseString'
          example:
            success: true
            message: Login successful
            data: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsInJvbGUiOiJBRE1JTiIsImlhdCI6MTcwMDAwMDAwMH0.signature
    '400':
      description: Validation error - missing or blank username/password
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          example:
            success: false
            message: "Validation failed for request parameters."
            data:
              username: must not be blank
              password: must not be blank
    '401':
      description: Authentication failed - invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          example:
            success: false
            message: Invalid username or password
            data: null
    '500':
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          example:
            success: false
            message: An unexpected error occurred
            data: null